```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RINO PLAYER</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#020617; color:#fff; font-family:sans-serif; }

/* タブ */
.tab-content{display:none;}
.tab-content.active{display:block;}
.nav-btn.active{background:#22d3ee;color:#000;}

/* ボタン */
.music-btn {
    width:100%;
    padding:12px;
    border-radius:12px;
    background:#0f172a;
    border:1px solid #334155;
    transition:all 0.3s;
}

.music-btn:hover {
    background:#1e293b;
}

.music-btn.active {
    background:#22d3ee;
    color:#000;
    box-shadow:0 0 20px #22d3ee, 0 0 40px #22d3ee;
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- ナビ -->
<div class="p-4 flex gap-2">
<button onclick="showTab('home')" class="nav-btn active" id="btn-home">HOME</button>
<button onclick="showTab('music')" class="nav-btn" id="btn-music">MUSIC</button>
</div>

<!-- HOME -->
<div id="home" class="tab-content active p-6">
<h1 class="text-2xl">RINO PLAYER</h1>
</div>

<!-- MUSIC -->
<div id="music" class="tab-content p-6 text-center">

<img id="p-art" src="hatonorino.png"
class="w-48 h-48 mx-auto mb-4 rounded-xl object-cover">

<div id="p-title" class="text-xl mb-4">STANDBY...</div>

<!-- 🎧 audio -->
<audio id="audio-rino" src="銀河の果てまで.mp3" loop></audio>
<audio id="audio-osechi" src="おせち.wav" loop></audio>
<audio id="audio-kokusen" src="kokusen.mp3" loop></audio>
<audio id="audio-ron" src="ron.mp3" loop></audio>
<audio id="audio-kami" src="kami.mp3" loop></audio>

<div class="space-y-3 max-w-md mx-auto">

<button onclick="changeMusic('rino')" class="music-btn">🚀 銀河の果てまで</button>
<button onclick="changeMusic('osechi')" class="music-btn">🍱 おせち</button>
<button onclick="changeMusic('kokusen')" class="music-btn">⚡ 黒閃</button>
<button onclick="changeMusic('ron')" class="music-btn">🀄 ロン</button>
<button onclick="changeMusic('kami')" class="music-btn">✨ 神</button>

</div>
</div>

<script>
// タブ切替
function showTab(id){
document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.getElementById('btn-'+id).classList.add('active');
}

// 🎧 曲データ
const musicData = {
rino:{ audio:audio_rino, img:'hatonorino.png', title:'銀河の果てまで' },
osechi:{ audio:audio_osechi, img:'IMG_5850.jpg', title:'おせち' },
kokusen:{ audio:audio_kokusen, img:'kokusen.png', title:'黒閃' },
ron:{ audio:audio_ron, img:'ron.png', title:'ロン' },
kami:{ audio:audio_kami, img:'kami.jpg', title:'神' }
};

let currentAudio = null;
let currentKey = null;

// フェードアウト
function fadeOut(audio, duration=500){
return new Promise(resolve=>{
if(!audio) return resolve();
let vol=audio.volume;
const step=vol/(duration/50);

const fade=setInterval(()=>{
vol-=step;
if(vol<=0){
audio.volume=0;
audio.pause();
clearInterval(fade);
resolve();
}else{
audio.volume=vol;
}
},50);
});
}

// フェードイン
function fadeIn(audio, duration=500){
audio.volume=0;
audio.play().catch(()=>{});

let vol=0;
const step=1/(duration/50);

const fade=setInterval(()=>{
vol+=step;
if(vol>=1){
audio.volume=1;
clearInterval(fade);
}else{
audio.volume=vol;
}
},50);
}

// ボタン発光
function updateActiveButton(key){
document.querySelectorAll('.music-btn').forEach(btn=>{
btn.classList.remove('active');
});
document.querySelector(`[onclick="changeMusic('${key}')"]`)
.classList.add('active');
}

// 🎧 曲切替
async function changeMusic(key){
const next=musicData[key];
if(currentKey===key) return;

await fadeOut(currentAudio);

document.getElementById('p-art').src=next.img;
document.getElementById('p-title').innerText='NOW: '+next.title;

fadeIn(next.audio);

currentAudio=next.audio;
currentKey=key;

updateActiveButton(key);
}

// 自動再生トライ
window.addEventListener('load',()=>{
changeMusic('rino');
});

// スマホ対策（最初のタップで再生）
document.addEventListener('click',()=>{
if(currentAudio && currentAudio.paused){
currentAudio.play().catch(()=>{});
}
},{once:true});
</script>

</body>
</html>
